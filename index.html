<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer 3D</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body style="margin:0;">

<a-scene 
  embedded 
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  background="color: #222">

  <!-- Luz forte -->
  <a-entity light="type: ambient; intensity: 2"></a-entity>
  <a-entity light="type: directional; intensity: 2; position: 1 3 2"></a-entity>

  <!-- Chão -->
  <a-plane rotation="-90 0 0" width="20" height="20" color="#555"></a-plane>

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="modelo" src="car1.glb"></a-asset-item>
  </a-assets>

  <!-- Modelo (FORÇADO) -->
  <a-entity 
    id="carro"
    gltf-model="#modelo"
    position="0 0 -3"
    scale="0.5 0.5 0.5"
    rotation="0 180 0">
  </a-entity>

  <!-- Câmera -->
  <a-entity camera position="0 1.6 3"></a-entity>

</a-scene>

<script>
const carro = document.querySelector('#carro');

carro.addEventListener('model-loaded', () => {
  console.log("Modelo carregado!");

  // FORÇA centralização automática
  const mesh = carro.getObject3D('mesh');
  if (mesh) {
    mesh.position.set(0, 0, 0);
  }
});

carro.addEventListener('model-error', (e) => {
  alert("Erro ao carregar modelo");
  console.log(e);
});
</script>

</body>
</html>
